<!DOCTYPE html>
<html lang="en">
<head>
  <title>three.js webgpu – earth</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; }
    #info {
      position: fixed;
      top: 16px; left: 0; right: 0;
      text-align: center;
      color: #fff;
      font: 13px/1.6 system-ui, sans-serif;
      pointer-events: none;
      user-select: none;
      text-shadow: 0 1px 4px rgba(0,0,0,.8);
    }
    #info a { color: #7fc; text-decoration: none; }
  </style>
</head>
<body>

<div id="info">
  <a href="https://threejs.org/" target="_blank" rel="noopener">three.js</a> · WebGPU Earth ·
  Hover = yellow outline &nbsp;·&nbsp; Click = diagonal fill
</div>

<!-- topojson for converting world-atlas topology to GeoJSON -->
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3/dist/topojson-client.min.js"></script>

<script type="importmap">
{
  "imports": {
    "three":        "https://threejs.org/build/three.webgpu.js",
    "three/webgpu": "https://threejs.org/build/three.webgpu.js",
    "three/tsl":    "https://threejs.org/build/three.tsl.js",
    "three/addons/":"https://threejs.org/examples/jsm/"
  }
}
</script>

<script type="module">

import * as THREE from 'three/webgpu';
import {
  step, normalWorldGeometry, output,
  texture as texNode,
  vec3, vec4,
  normalize, positionWorld, bumpMap,
  cameraPosition, color, uniform,
  mix, uv, max
} from 'three/tsl';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ── Overlay canvas resolution (equirectangular) ───────────────────────────────
const OW = 4096, OH = 2048;

// ── State ─────────────────────────────────────────────────────────────────────
let camera, scene, renderer, controls, globe;
let overlayCtx, countryTexture, stripePattern;
let countries   = [];
let hoveredIdx  = null;
const selected  = new Set();
let prevTime    = performance.now();

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function init() {

  // Camera
  camera = new THREE.PerspectiveCamera(25, innerWidth / innerHeight, 0.1, 100);
  camera.position.set(4.5, 2, 3);

  // Scene
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000000);

  // Sun
  const sun = new THREE.DirectionalLight('#ffffff', 2);
  sun.position.set(0, 0, 3);
  scene.add(sun);

  // ── Uniforms (user-specified) ───────────────────────────────────────────────
  // rgb(46,144,220)  → #2E90DC
  // rgb(76,158,164)  → #4C9EA4
  const atmosphereDayColor      = uniform(color('#2e90dc'));
  const atmosphereTwilightColor = uniform(color('#4c9ea4'));
  const roughnessLow  = uniform(0.495);
  const roughnessHigh = uniform(0.904);

  // ── Textures ───────────────────────────────────────────────────────────────
  const loader = new THREE.TextureLoader();
  const root   = 'https://threejs.org/examples/textures/planets/';

  const dayTex = loader.load(root + 'earth_day_4096.jpg');
  dayTex.colorSpace = THREE.SRGBColorSpace;
  dayTex.anisotropy = 8;

  const nightTex = loader.load(root + 'earth_night_4096.jpg');
  nightTex.colorSpace = THREE.SRGBColorSpace;
  nightTex.anisotropy = 8;

  const bumpTex = loader.load(root + 'earth_bump_roughness_clouds_4096.jpg');
  bumpTex.anisotropy = 8;

  // ── TSL nodes ──────────────────────────────────────────────────────────────
  const viewDir   = positionWorld.sub(cameraPosition).normalize();
  const fresnel   = viewDir.dot(normalWorldGeometry).abs().oneMinus().toVar();
  const sunOri    = normalWorldGeometry.dot(normalize(sun.position)).toVar();
  const atmoColor = mix(atmosphereTwilightColor, atmosphereDayColor,
                        sunOri.smoothstep(-0.25, 0.75));

  // ── Globe material ─────────────────────────────────────────────────────────
  const globeMat   = new THREE.MeshStandardNodeMaterial();
  const clouds     = texNode(bumpTex, uv()).b.smoothstep(0.2, 1);
  globeMat.colorNode = mix(texNode(dayTex), vec3(1), clouds.mul(2));

  const roughness  = max(texNode(bumpTex).g, step(0.01, clouds));
  globeMat.roughnessNode = roughness.remap(0, 1, roughnessLow, roughnessHigh);

  const night    = texNode(nightTex);
  const dayStr   = sunOri.smoothstep(-0.25, 0.5);
  const atmoDStr = sunOri.smoothstep(-0.5, 1);
  const atmoMix  = atmoDStr.mul(fresnel.pow(2)).clamp(0, 1);
  let   finalOut = mix(night.rgb, output.rgb, dayStr);
  finalOut       = mix(finalOut, atmoColor, atmoMix);
  globeMat.outputNode = vec4(finalOut, output.a);
  globeMat.normalNode = bumpMap(max(texNode(bumpTex).r, clouds));

  const sphereGeo = new THREE.SphereGeometry(1, 64, 64);
  globe = new THREE.Mesh(sphereGeo, globeMat);
  scene.add(globe);

  // ── Atmosphere ─────────────────────────────────────────────────────────────
  const atmoMat = new THREE.MeshBasicNodeMaterial({ side: THREE.BackSide, transparent: true });
  const atmoAlpha = fresnel.remap(0.73, 1, 1, 0).pow(3).mul(sunOri.smoothstep(-0.5, 1));
  atmoMat.outputNode = vec4(atmoColor, atmoAlpha);
  const atmosphere = new THREE.Mesh(sphereGeo, atmoMat);
  atmosphere.scale.setScalar(1.04);
  scene.add(atmosphere);

  // ── Country overlay canvas ─────────────────────────────────────────────────
  const oc     = document.createElement('canvas');
  oc.width     = OW;
  oc.height    = OH;
  overlayCtx   = oc.getContext('2d');

  // Diagonal yellow/black stripe pattern (20×20 tile)
  const pc = document.createElement('canvas');
  pc.width  = 20; pc.height = 20;
  const pctx = pc.getContext('2d');
  pctx.fillStyle = '#ffff00';
  pctx.fillRect(0, 0, 20, 20);
  pctx.strokeStyle = '#000';
  pctx.lineWidth   = 5;
  for (let i = -20; i <= 40; i += 10) {
    pctx.beginPath(); pctx.moveTo(i, 0); pctx.lineTo(i + 20, 20); pctx.stroke();
  }
  stripePattern = overlayCtx.createPattern(pc, 'repeat');

  countryTexture = new THREE.CanvasTexture(oc);
  countryTexture.colorSpace = THREE.SRGBColorSpace;

  const overlayMat = new THREE.MeshBasicNodeMaterial({ transparent: true, depthWrite: false });
  overlayMat.outputNode = texNode(countryTexture, uv());

  // Child of globe → co-rotates; slightly larger to avoid z-fighting
  const overlayMesh = new THREE.Mesh(new THREE.SphereGeometry(1.003, 64, 64), overlayMat);
  globe.add(overlayMesh);

  // ── Renderer ───────────────────────────────────────────────────────────────
  renderer = new THREE.WebGPURenderer({ antialias: true });
  renderer.setPixelRatio(devicePixelRatio);
  renderer.setSize(innerWidth, innerHeight);
  renderer.setAnimationLoop(animate);
  document.body.appendChild(renderer.domElement);

  // ── Controls ───────────────────────────────────────────────────────────────
  controls = new OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.minDistance   = 1.5;
  controls.maxDistance   = 20;

  // ── Events ─────────────────────────────────────────────────────────────────
  window.addEventListener('resize', onResize);
  renderer.domElement.addEventListener('mousemove',  onMouseMove);
  renderer.domElement.addEventListener('mousedown',  onMouseDown);
  renderer.domElement.addEventListener('mouseleave', () => {
    if (hoveredIdx !== null) { hoveredIdx = null; redrawCanvas(); }
  });
  renderer.domElement.addEventListener('touchmove',  onTouchMove,  { passive: false });
  renderer.domElement.addEventListener('touchstart', onTouchStart, { passive: false });

  // ── Load country data ──────────────────────────────────────────────────────
  await loadCountries();
}

// ── GeoJSON data ──────────────────────────────────────────────────────────────
async function loadCountries() {
  try {
    const res  = await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json');
    const topo = await res.json();
    countries  = topojson.feature(topo, topo.objects.countries).features;
  } catch (e) {
    console.warn('Country data failed to load:', e);
  }
}

// ── Point-in-polygon (ray-casting) ────────────────────────────────────────────
function pointInRing(lon, lat, ring) {
  let inside = false;
  for (let i = 0, j = ring.length - 1; i < ring.length; j = i++) {
    const xi = ring[i][0], yi = ring[i][1];
    const xj = ring[j][0], yj = ring[j][1];
    if ((yi > lat) !== (yj > lat) &&
        lon < (xj - xi) * (lat - yi) / (yj - yi) + xi) {
      inside = !inside;
    }
  }
  return inside;
}

function getCountryIndex(lon, lat) {
  for (let i = 0; i < countries.length; i++) {
    const geom = countries[i].geometry;
    if (!geom) continue;
    const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;
    for (const poly of polys) {
      if (pointInRing(lon, lat, poly[0])) return i;
    }
  }
  return null;
}

// ── 3-D world-point → [lon, lat] ─────────────────────────────────────────────
// Converts a point on the globe sphere (world space) to geographic coordinates,
// accounting for the globe's current rotation.
function worldPtToLonLat(worldPt) {
  globe.updateWorldMatrix(true, false);
  const p = globe.worldToLocal(worldPt.clone()).normalize();

  const lat = Math.asin(Math.max(-1, Math.min(1, p.y))) * 180 / Math.PI;

  // SphereGeometry: x = sin(θ)·cos(φ), z = sin(θ)·sin(φ)
  // φ = atan2(z, x); UV u = φ/(2π), u=0 → lon=-180
  let phi = Math.atan2(p.z, p.x);
  if (phi < 0) phi += 2 * Math.PI;
  const lon = phi * 180 / Math.PI - 180;
  return [lon, lat];
}

// ── Raycasting ────────────────────────────────────────────────────────────────
const raycaster = new THREE.Raycaster();
const ndc       = new THREE.Vector2();

function hitLonLat(clientX, clientY) {
  const { left, top, width, height } = renderer.domElement.getBoundingClientRect();
  ndc.set(
    ((clientX - left) / width)  * 2 - 1,
   -((clientY - top)  / height) * 2 + 1
  );
  raycaster.setFromCamera(ndc, camera);
  const hits = raycaster.intersectObject(globe);
  return hits.length ? worldPtToLonLat(hits[0].point) : null;
}

// ── Event handlers ────────────────────────────────────────────────────────────
function onMouseMove({ clientX, clientY }) {
  const ll  = hitLonLat(clientX, clientY);
  const idx = ll ? getCountryIndex(ll[0], ll[1]) : null;
  if (idx !== hoveredIdx) { hoveredIdx = idx; redrawCanvas(); }
}

function onMouseDown({ clientX, clientY }) {
  const ll = hitLonLat(clientX, clientY);
  if (!ll) return;
  const idx = getCountryIndex(ll[0], ll[1]);
  if (idx === null) return;
  selected.has(idx) ? selected.delete(idx) : selected.add(idx);
  redrawCanvas();
}

function onTouchMove(e) {
  e.preventDefault();
  onMouseMove(e.touches[0]);
}
function onTouchStart(e) {
  e.preventDefault();
  onMouseDown(e.touches[0]);
}

// ── Canvas drawing helpers ────────────────────────────────────────────────────
function lonLatToXY(lon, lat) {
  return [
    (lon + 180) / 360 * OW,
    (90  - lat) / 180 * OH,
  ];
}

// Trace all rings of a GeoJSON feature into the current canvas path.
// Antimeridian jumps (Δx > half canvas) become moveTo instead of lineTo.
function traceFeature(feature) {
  const geom = feature.geometry;
  if (!geom) return;
  const polys = geom.type === 'Polygon' ? [geom.coordinates] : geom.coordinates;

  overlayCtx.beginPath();
  for (const poly of polys) {
    for (const ring of poly) {
      let prevX = null;
      for (let k = 0; k < ring.length; k++) {
        const [x, y] = lonLatToXY(ring[k][0], ring[k][1]);
        if (k === 0 || (prevX !== null && Math.abs(x - prevX) > OW * 0.5)) {
          overlayCtx.moveTo(x, y);
        } else {
          overlayCtx.lineTo(x, y);
        }
        prevX = x;
      }
      overlayCtx.closePath();
    }
  }
}

function redrawCanvas() {
  overlayCtx.clearRect(0, 0, OW, OH);

  // Selected countries: diagonal yellow-black fill
  overlayCtx.fillStyle = stripePattern;
  for (const idx of selected) {
    if (countries[idx]) {
      traceFeature(countries[idx]);
      overlayCtx.fill();
    }
  }

  // Hovered country: 3-pixel-wide yellow outline
  // lineWidth 7 on a 4096px canvas ≈ 3 screen-pixels at typical viewing distance
  if (hoveredIdx !== null && countries[hoveredIdx]) {
    overlayCtx.strokeStyle = '#ffff00';
    overlayCtx.lineWidth   = 7;
    overlayCtx.lineJoin    = 'round';
    traceFeature(countries[hoveredIdx]);
    overlayCtx.stroke();
  }

  countryTexture.needsUpdate = true;
}

// ── Resize ────────────────────────────────────────────────────────────────────
function onResize() {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
}

// ── Render loop ───────────────────────────────────────────────────────────────
async function animate() {
  const now   = performance.now();
  const delta = (now - prevTime) / 1000;
  prevTime    = now;

  globe.rotation.y += delta * 0.025;
  controls.update();
  renderer.render(scene, camera);
}

init();
</script>
</body>
</html>
